<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>St. Mary — Content Manager</title>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "gitty-yup/st-mary-website",
            branch: "master",
            base_url: "https://st-mary-website.vercel.app",
            auth_endpoint: "api/auth"
          },
          media_folder: "public/media/uploads",
          public_folder: "/media/uploads",
          collections: [
            {
              name: "blog",
              label: "Blog Posts",
              folder: "content/blog",
              create: true,
              slug: "{{year}}-{{month}}-{{day}}_{{slug}}",
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false },
                { label: "Author", name: "author", widget: "string", default: "St. Mary" },
                { label: "Category", name: "category", widget: "select", options: ["Parish News", "Events", "Announcements", "Community"], default: "Parish News" },
                { label: "Body", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
